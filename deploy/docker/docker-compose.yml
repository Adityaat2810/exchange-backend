version: "3.9"

services:
  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    image: exchange-backedn-auth:dev
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://exchange_user:exchange_password@postgres:5432/auth_db?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  orders:
    build:
      context: ../..
      dockerfile: services/orders/Dockerfile
    image: exchange-backedn-orders:dev
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://exchange_user:exchange_password@postgres:5432/orders_db?sslmode=disable
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=exchange_db
      - POSTGRES_USER=exchange_user
      - POSTGRES_PASSWORD=exchange_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange_user -d exchange_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
