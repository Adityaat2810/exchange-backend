version: "3.9"

services:
  # Kong API Gateway - the only externally accessible service
  kong:
    image: kong:3.9
    environment:
      - KONG_DATABASE=off
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_DECLARATIVE_CONFIG=/kong/declarative/kong.yml
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      # Only Kong is exposed externally
      - "8000:8000"   # Proxy port - all API traffic goes here
      - "8001:8001"   # Admin API - for debugging/configuration
    depends_on:
      auth:
        condition: service_healthy
      orders:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exchange-network

  # Auth Service - INTERNAL ONLY (no ports exposed to host)
  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    image: exchange-backedn-auth:dev
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://exchange_user:exchange_password@postgres:5432/auth_db?sslmode=disable
    # No ports exposed - only accessible through Kong gateway
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exchange-network

  # Orders Service - INTERNAL ONLY (no ports exposed to host)
  orders:
    build:
      context: ../..
      dockerfile: services/orders/Dockerfile
    image: exchange-backedn-orders:dev
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://exchange_user:exchange_password@postgres:5432/orders_db?sslmode=disable
    # No ports exposed - only accessible through Kong gateway
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exchange-network

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=exchange_db
      - POSTGRES_USER=exchange_user
      - POSTGRES_PASSWORD=exchange_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange_user -d exchange_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - exchange-network

networks:
  exchange-network:
    driver: bridge

volumes:
  postgres_data:
