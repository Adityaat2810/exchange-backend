apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/component: gateway
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      # Auth Service
      - name: auth-service
        url: http://auth:8080
        routes:
          - name: auth-route
            paths:
              - /auth
            strip_path: true

      # Orders Service
      - name: orders-service
        url: http://orders:8081
        routes:
          - name: orders-route
            paths:
              - /orders
            strip_path: true

    # Global plugins for all services
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          credentials: false
          max_age: 3600

      - name: correlation-id
        config:
          header_name: X-Request-Id
          generator: uuid
          echo_downstream: true
