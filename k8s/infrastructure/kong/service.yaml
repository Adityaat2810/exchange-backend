apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/component: gateway
spec:
  type: LoadBalancer
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: kong
---
apiVersion: v1
kind: Service
metadata:
  name: kong-admin
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  ports:
    - name: admin
      port: 8001
      targetPort: 8001
      protocol: TCP
  selector:
    app: kong
