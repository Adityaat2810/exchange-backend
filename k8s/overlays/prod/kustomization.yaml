apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: exchange-backend

resources:
  - ../../base
  - ../../infrastructure
  - ../../services/auth
  - ../../services/orders

# Production-specific patches
patches:
  - target:
      kind: Deployment
      name: auth
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
  - target:
      kind: Deployment
      name: orders
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
