# Air configuration for hot-reload
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/auth ./services/auth/cmd/auth"
bin = "./tmp/auth"
# full_bin is required if the binary needs arguments or environment variables
# But here we just need to ensure it runs.
# Air should automatically run the binary at 'bin' after build.
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "migrations"]
delay = 1000
stop_on_error = true
log = "air_errors.log"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
