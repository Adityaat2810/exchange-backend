# Air configuration for hot-reload
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/auth ./services/auth/cmd/auth"
bin = "./tmp/auth"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "migrations"]
delay = 1000

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"
