# Air configuration for hot-reload
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/orders ./services/orders/cmd/orders"
bin = "./tmp/orders"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "migrations"]
delay = 1000
stop_on_error = true
log = "air_errors.log"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
