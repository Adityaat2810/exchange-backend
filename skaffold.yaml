apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: exchange-backedn

build:
  local:
    push: false
    useBuildkit: true
  artifacts:
    # Auth Service - uses dev Dockerfile with hot-reload
    - image: exchange-backedn-auth
      context: .
      docker:
        dockerfile: services/auth/Dockerfile.dev
      sync:
        # Sync Go files directly to container, air watches and rebuilds
        infer:
          - "services/auth/**/*.go"
          - "go.mod"
          - "go.sum"

    # Orders Service - uses dev Dockerfile with hot-reload
    - image: exchange-backedn-orders
      context: .
      docker:
        dockerfile: services/orders/Dockerfile.dev
      sync:
        infer:
          - "services/orders/**/*.go"
          - "go.mod"
          - "go.sum"

manifests:
  kustomize:
    paths:
      - k8s/overlays/dev

deploy:
  kubectl: {}

portForward:
  # Kong Gateway - all traffic goes through here
  - resourceType: service
    resourceName: kong-proxy
    namespace: exchange-backend
    port: 80
    localPort: 9000
  # Kong Admin API (for debugging/configuration)
  - resourceType: service
    resourceName: kong-admin
    namespace: exchange-backend
    port: 8001
    localPort: 9001
  # Postgres for development
  - resourceType: service
    resourceName: postgres
    namespace: exchange-backend
    port: 5432
    localPort: 5432

profiles:
  # Production profile - uses optimized multi-stage Dockerfile
  - name: prod
    manifests:
      kustomize:
        paths:
          - k8s/overlays/prod
    build:
      local:
        push: true
      artifacts:
        - image: exchange-backedn-auth
          context: .
          docker:
            dockerfile: services/auth/Dockerfile
        - image: exchange-backedn-orders
          context: .
          docker:
            dockerfile: services/orders/Dockerfile
